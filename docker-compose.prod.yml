services:
  # Reverse proxy with automatic SSL
  traefik:
    image: traefik:v3.2
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/letsencrypt/acme.json
    networks:
      - dm1-web
    restart: unless-stopped

  # FastAPI backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - GEMINI_API_KEY=${GOOGLE_AI_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - MONGODB_URI=mongodb://${MONGO_USER:-dm1}:${MONGO_PASSWORD}@mongodb:27017/dm1?authSource=admin
      - MONGODB_DB=dm1
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET=${JWT_SECRET}
      - LM_STUDIO_URL=http://host.docker.internal:1234/v1
      - CORS_ORIGINS=https://${DOMAIN},http://localhost:3000
      - APP_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ws`))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.priority=100"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.services.backend.loadbalancer.server.scheme=http"
    volumes:
      - dm1-assets:/app/assets
    networks:
      - dm1-web
      - dm1-data
    depends_on:
      - neo4j
      - mongodb
      - qdrant
    restart: unless-stopped

  # Next.js frontend
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://${DOMAIN}
        - NEXT_PUBLIC_WS_URL=wss://${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`) && !PathPrefix(`/api`) && !PathPrefix(`/ws`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - dm1-web
    depends_on:
      - backend
    restart: unless-stopped

  # Knowledge graph
  neo4j:
    image: neo4j:5.26-community
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    volumes:
      - neo4j-data:/data
    networks:
      - dm1-data
    restart: unless-stopped

  # User accounts + checkpoints
  mongodb:
    image: mongo:7
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-dm1}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - dm1-data
    restart: unless-stopped

  # Vector embeddings
  qdrant:
    image: qdrant/qdrant:v1.17.1
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - dm1-data
    restart: unless-stopped

volumes:
  neo4j-data:
  mongo-data:
  qdrant-data:
  dm1-assets:

networks:
  dm1-web:
    name: dm1-web
  dm1-data:
    name: dm1-data
    internal: true
